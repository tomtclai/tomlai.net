<!DOCTYPE html>
<html lang="en" data-theme="dark-poole">
  {% include head.html %}

  <body>
    <header class="mast">
      <div class="mast-inner container">
        <a class="mast-id" href="{{ site.baseurl }}/" title="Home">
          <span class="dot"></span>
          <span>{{ site.title }}</span>
        </a>
        <nav>
          <a href="{{ site.baseurl }}/"{% if page.url == '/' %} class="active"{% endif %}>index</a>
          <a href="{{ site.baseurl }}/#game">🎮</a>
          <a href="{{ site.baseurl }}/japanese"{% if page.url contains '/japanese' %} class="active"{% endif %}>あ</a>
          <a href="https://www.linkedin.com/in/tomtclai/">linkedin</a>
          <a href="https://github.com/tomtclai">github</a>
        </nav>
      </div>
    </header>

    <div class="container content">
      <main>
        {{ content }}
      </main>

      <footer class="footer">
        <small>
          &copy;
          <time datetime="{{ site.time | date_to_xmlschema }}"
            >{{ site.time | date: '%Y' }}</time
          >. All rights reserved.
        </small>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>

    {% if site.ga_analytics %}
    <script>
      (function (i, s, o, g, r, a, m) {
        i["GoogleAnalyticsObject"] = r;
        (i[r] =
          i[r] ||
          function () {
            (i[r].q = i[r].q || []).push(arguments);
          }),
          (i[r].l = 1 * new Date());
        (a = s.createElement(o)), (m = s.getElementsByTagName(o)[0]);
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m);
      })(
        window,
        document,
        "script",
        "https://www.google-analytics.com/analytics.js",
        "ga"
      );
      ga("create", "{{ site.ga_analytics }}", "auto");
      ga("send", "pageview");
    </script>
    {% endif %}
  </body>
</html>
