---
layout: default
---

<article class="post-page">
  <div class="crumbs">
    <a href="/">index</a><span class="sep">/</span><a href="/">posts</a><span class="sep">/</span><span>{{ page.slug | default: page.title | downcase }}</span>
  </div>
  <h1>{{ page.title }}</h1>
  <div class="meta-line">
    <span>{{ page.date | date: "%B %-d, %Y" }}</span>
  </div>
  {{ content }}
</article>
